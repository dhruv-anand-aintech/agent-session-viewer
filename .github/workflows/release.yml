name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tarball_url: ${{ steps.version.outputs.tarball_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          always-auth: true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tarball_url=https://registry.npmjs.org/agent-session-viewer/-/agent-session-viewer-${VERSION}.tgz" >> $GITHUB_OUTPUT

      - name: Ensure package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${{ steps.version.outputs.version }}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION). Run: npm version $TAG_VERSION"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: v${{ steps.version.outputs.version }}

  update-homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: publish-npm
    steps:
      - name: Wait for npm propagation
        run: sleep 30

      - name: Compute tarball sha256
        id: sha
        run: |
          URL="${{ needs.publish-npm.outputs.tarball_url }}"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "Tarball: $URL"
          echo "sha256: $SHA"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: dhruv-anand-aintech/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION=${{ needs.publish-npm.outputs.version }}
          SHA=${{ steps.sha.outputs.sha256 }}
          FORMULA="homebrew-tap/Formula/agent-session-viewer.rb"

          # Update url and sha256
          sed -i "s|url \".*\"|url \"https://registry.npmjs.org/agent-session-viewer/-/agent-session-viewer-${VERSION}.tgz\"|" "$FORMULA"
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" "$FORMULA"

          cat "$FORMULA"

      - name: Commit and push formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-session-viewer.rb
          git commit -m "Update agent-session-viewer to v${{ needs.publish-npm.outputs.version }}"
          git push
