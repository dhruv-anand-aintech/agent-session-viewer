name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      custom_version:
        description: 'Or specify exact version (e.g. 1.2.3) — overrides bump type'
        required: false

jobs:
  bump:
    name: Bump version and tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          if [ -n "${{ github.event.inputs.custom_version }}" ]; then
            npm version ${{ github.event.inputs.custom_version }} --no-git-tag-version
            VERSION=${{ github.event.inputs.custom_version }}
          else
            npm version ${{ github.event.inputs.bump }} --no-git-tag-version
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Commit and tag
        run: |
          git add package.json
          git commit -m "Bumps version to v${VERSION}"
          git tag "v${VERSION}"
          git push origin main --follow-tags
